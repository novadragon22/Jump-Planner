<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVE Jump Freight Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#030507; --panel:#0a0d10; --panel2:#0a0f13; --line:#1a2028; --line2:#2a4050;
    --gold:#c9a868; --gold-bright:#e8d296; --gold-dim:#8a7048; --gold-deep:#6a4828; --gold-soft:#c9b676;
    --cyan:#7ab8c8; --cyan-edge:#2a4050; --cyan-bright:#a0d0e0;
    --green:#8cc86a; --red:#d66a5a; --rederr:#e89b8d; --amber:#d8a24a;
    --text:#c9d4db; --text2:#a8bac8; --muted:#7a8fa0; --muted2:#5a6b78;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#050709}
  ::-webkit-scrollbar-thumb{background:#1a2430;border:1px solid #050709}
  button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}
  input,select{font:inherit;outline:none}
  select{appearance:none;background:rgba(10,14,20,.8);border:1px solid var(--line2);color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 8px}
  select:focus,input:focus{border-color:var(--gold)}
  .diamond{background:linear-gradient(135deg,#c8a068,#6a4828);clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}

  .app{display:flex;flex-direction:column;width:50vw;height:50vh;zoom:2}
  .topbar{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tb-d{width:13px;height:13px}
  .tb-title{font-family:var(--mono);font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-bright)}
  .tb-sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2)}
  .tb-stat{margin-left:auto;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .tb-pill{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);display:flex;align-items:center;gap:6px}
  .tb-pill b{color:var(--cyan)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--muted2)}
  .dot.ok{background:var(--green);box-shadow:0 0 5px rgba(140,200,106,.6)}
  .dot.busy{background:var(--gold);animation:p 1.1s infinite}
  .dot.err{background:var(--red)}
  @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}

  .main{flex:1;display:flex;min-height:0}
  .side{width:340px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto;background:var(--bg)}
  .mapwrap{flex:1;position:relative;min-width:0;background:#02040a}
  canvas{display:block;width:100%;height:100%;cursor:grab}
  canvas.drag{cursor:grabbing}

  .sec{border-bottom:1px solid var(--line);padding:13px 14px}
  .sec h3{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .sec h3 .d{width:7px;height:7px}
  .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
  .ships{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .ship{border:1px solid var(--line2);padding:8px 9px;cursor:pointer;transition:.12s;background:rgba(10,14,20,.5)}
  .ship:hover{border-color:var(--gold-dim)}
  .ship.on{border-color:var(--gold);background:rgba(201,168,104,.1)}
  .ship .nm{font-family:var(--mono);font-size:12px;color:var(--gold-bright);font-weight:500}
  .ship .iso{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px}
  .skills{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .skills .f label{font-size:9px}
  .skills select{width:100%}
  .chkrow{display:flex;align-items:center;gap:8px;margin-top:10px;font-family:var(--mono);font-size:10.5px;color:var(--text2)}
  .chkrow input{accent-color:var(--gold)}

  .srch{position:relative}
  .srch input{width:100%;background:rgba(10,14,20,.8);border:1px solid var(--line2);color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 10px}
  .drop{position:absolute;left:0;right:0;top:100%;z-index:40;background:var(--panel);border:1px solid var(--gold-dim);border-top:none;max-height:230px;overflow-y:auto;display:none}
  .drop.on{display:block}
  .opt{padding:7px 10px;font-family:var(--mono);font-size:11.5px;cursor:pointer;display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid var(--line)}
  .opt:hover,.opt.hi{background:rgba(201,168,104,.12)}
  .opt .rg{color:var(--muted);font-size:9.5px}
  .ss{font-family:var(--mono);font-weight:600;font-size:11px}

  .wp{display:flex;align-items:center;gap:9px;padding:8px 9px;border:1px solid var(--line);border-left:2px solid var(--cyan);background:var(--panel2);margin-bottom:5px}
  .wp .ord{font-family:var(--mono);font-size:10px;color:var(--muted2);width:16px}
  .wp .nm{font-family:var(--mono);font-size:12px;color:#dfe7ee;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wp .rg{font-family:var(--mono);font-size:9px;color:var(--muted)}
  .wp .x{color:#6c8592;font-family:var(--mono);font-size:12px;padding:0 4px;opacity:.6}
  .wp .x:hover{opacity:1;color:var(--rederr)}
  .wp.hs{border-left-color:var(--red)}
  .wp-empty{font-family:var(--mono);font-size:10.5px;color:var(--muted2);padding:10px 0;text-align:center;line-height:1.5}

  .legs{display:flex;flex-direction:column}
  .leg{border:1px solid var(--line);border-top:none;padding:9px 11px;font-family:var(--mono)}
  .leg:first-child{border-top:1px solid var(--line)}
  .leg.bad{border-left:2px solid var(--red)}
  .leg.ok{border-left:2px solid var(--green)}
  .leg-top{display:flex;justify-content:space-between;font-size:11.5px;color:#dfe7ee}
  .leg-top .ly{color:var(--cyan)}
  .leg-top .ly.over{color:var(--red)}
  .leg-meta{display:flex;justify-content:space-between;font-size:9.5px;color:var(--muted);margin-top:4px}
  .leg-meta .fuel{color:var(--gold-soft)}
  .warn{font-size:9.5px;color:var(--rederr);margin-top:4px}

  .tot{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
  .tile{border:1px solid var(--line);background:var(--panel2);padding:10px 11px}
  .tile .l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .tile .v{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:4px;color:var(--gold-soft)}
  .tile .v.cy{color:var(--cyan)}
  .tile .sub{font-family:var(--mono);font-size:9px;color:var(--muted2);margin-top:2px}

  .legend{position:absolute;left:12px;bottom:12px;background:rgba(3,5,7,.82);border:1px solid var(--line);padding:9px 11px;font-family:var(--mono);font-size:9.5px;color:var(--muted);backdrop-filter:blur(3px)}
  .legend .row{display:flex;align-items:center;gap:7px;margin:3px 0}
  .legend .sw{width:9px;height:9px;border-radius:50%}
  .mapbtns{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:6px}
  .mbtn{width:30px;height:30px;background:rgba(3,5,7,.82);border:1px solid var(--line2);color:var(--text2);font-family:var(--mono);font-size:14px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
  .mbtn:hover{border-color:var(--gold);color:var(--gold-bright)}
  .mbtn.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,104,.12)}

  .tip{position:absolute;z-index:50;pointer-events:none;background:var(--panel);border:1px solid var(--gold-dim);padding:9px 11px;font-family:var(--mono);font-size:11px;max-width:240px;display:none;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  .tip.pinned{pointer-events:auto;border-color:var(--gold)}
  .tipx{float:right;margin:-2px -3px 0 8px;color:#6c8592;cursor:pointer;font-size:12px}
  .tipx:hover{color:var(--rederr)}
  .tip.on{display:block}
  .tip .nm{color:var(--gold-bright);font-size:12.5px;font-weight:600;margin-bottom:3px}
  .tip .rg{color:var(--muted);font-size:9.5px;margin-bottom:6px}
  .tip .kv{display:flex;justify-content:space-between;gap:14px;font-size:10px;color:var(--text2);margin:2px 0}
  .tip .kv b{color:var(--cyan)}
  .tip .act{margin-top:8px;pointer-events:auto;display:flex;gap:6px;flex-wrap:wrap}
  .tip a,.tip button{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--line2);color:#8ba4b3;padding:5px 8px;text-decoration:none;cursor:pointer}
  .tip a:hover,.tip button:hover{border-color:var(--gold);color:var(--gold-bright)}
  .tip .zk{font-size:9.5px;color:var(--muted);margin-top:6px}

  .note{font-family:var(--mono);font-size:9.5px;color:var(--muted);line-height:1.5;padding:11px 14px;border-top:1px solid var(--line)}
  .note b{color:var(--gold)}
  .hl{color:var(--rederr)}

  .auth-btn{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold-bright);padding:5px 11px;background:rgba(201,168,104,.1);cursor:pointer}
  .auth-btn:hover{background:rgba(201,168,104,.2)}
  .pilot-chip{display:inline-flex;align-items:center;gap:7px;padding:3px 8px 3px 3px;border:1px solid rgba(201,168,104,.3);background:rgba(201,168,104,.07)}
  .pilot-chip img{width:20px;height:20px;border-radius:50%}
  .pilot-chip .pn{font-family:var(--mono);font-size:10.5px;color:var(--gold-bright)}
  .pilot-chip .px{color:#6c8592;font-family:var(--mono);font-size:11px;padding:0 3px;opacity:.6;cursor:pointer}
  .pilot-chip .px:hover{opacity:1;color:var(--rederr)}

  .overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.82);backdrop-filter:blur(3px);align-items:flex-start;justify-content:center;padding:8vh 1rem}
  .overlay.on{display:flex}
  .lm{background:var(--panel);border:1px solid var(--gold);max-width:480px;width:100%;padding:22px 24px;box-shadow:0 0 0 3px rgba(201,168,104,.08),0 20px 60px rgba(0,0,0,.6)}
  .lm-h{font-family:var(--mono);font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .lm-h .d{width:9px;height:9px}
  .lm-p{font-size:12.5px;color:var(--text2);line-height:1.55;margin-bottom:16px}
  .fld{width:100%;padding:10px 12px;background:rgba(10,14,20,.8);border:1px solid rgba(201,168,104,.35);color:#d9e0e6;font-family:var(--mono);font-size:12.5px}
  .fld:focus{border-color:var(--gold)}
  .ro{font-family:var(--mono);font-size:11px;color:var(--muted);background:rgba(10,14,20,.6);border:1px solid var(--line);padding:8px 10px;word-break:break-all}
  .btn-gold{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(180deg,rgba(201,168,104,.18),rgba(201,168,104,.08));border:1px solid var(--gold);color:var(--gold-bright);font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
  .btn-gold:hover{background:linear-gradient(180deg,rgba(201,168,104,.28),rgba(201,168,104,.14))}
  .btn-x{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line2);padding:10px 16px;cursor:pointer}
  .btn-x:hover{color:var(--text);border-color:#3a5060}
  .lm-act{display:flex;gap:10px;margin-top:16px}
  .lm-hint{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:14px;line-height:1.5}
  .lm-hint b{color:var(--gold)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="tb-d diamond"></span>
    <div><div class="tb-title">Jump Freight Planner</div><div class="tb-sub">New Eden · capital logistics</div></div>
    <div class="tb-stat">
      <span class="tb-pill" id="calPill"><span class="dot" id="calDot"></span> <span id="calTxt">calibrating…</span></span>
      <span class="tb-pill" id="killPill"><span class="dot" id="killDot"></span> <span id="killTxt">kill feed</span></span>
      <span id="authArea"></span>
    </div>
  </div>
  <div class="main">
    <div class="side">
      <div class="sec">
        <h3><span class="d diamond"></span>Jump freighter</h3>
        <div class="ships" id="ships"></div>
      </div>
      <div class="sec">
        <h3><span class="d diamond"></span>Skills</h3>
        <div class="skills">
          <div class="f"><label class="lbl">Jump Drive Cal.</label><select id="skJDC"></select></div>
          <div class="f"><label class="lbl">Fuel Conserv.</label><select id="skJFC"></select></div>
          <div class="f"><label class="lbl">Jump Freighter</label><select id="skJF"></select></div>
        </div>
        <div class="chkrow"><input type="checkbox" id="fatRed" checked><label for="fatRed">Jump-freighter fatigue reduction (×0.1)</label></div>
      </div>
      <div class="sec">
        <h3><span class="d diamond"></span>Route waypoints</h3>
        <div class="srch">
          <input id="search" placeholder="Add system by name…" autocomplete="off">
          <div class="drop" id="drop"></div>
        </div>
        <div id="wps" style="margin-top:10px"></div>
      </div>
      <div class="sec">
        <h3><span class="d diamond"></span>Route</h3>
        <div class="legs" id="legs"></div>
        <div class="tot" id="tot" style="margin-top:10px"></div>
      </div>
      <div class="note" id="note"></div>
    </div>
    <div class="mapwrap">
      <canvas id="map"></canvas>
      <div class="mapbtns">
        <button class="mbtn" id="zin">+</button>
        <button class="mbtn" id="zout">−</button>
        <button class="mbtn" id="zfit" title="Fit">⌂</button>
        <button class="mbtn" id="zgate" title="Toggle gate links">⋈</button>
        <button class="mbtn" id="zheat" title="Toggle kill heat">☢</button>
        <button class="mbtn" id="zsov" title="Toggle sovereignty">⬡</button>
        <button class="mbtn" id="zsta" title="Toggle NPC stations">⌁</button>
        <button class="mbtn" id="zpilot" title="Center on pilot">◎</button>
      </div>
      <div class="legend" id="legend">
        <div class="row"><span class="sw" style="background:var(--green)"></span>High-sec (≥0.5)</div>
        <div class="row"><span class="sw" style="background:var(--amber)"></span>Low-sec (0.1–0.4)</div>
        <div class="row"><span class="sw" style="background:var(--red)"></span>Null-sec (≤0.0)</div>
        <div class="row"><span class="sw" style="background:var(--gold)"></span>Waypoint / route</div>
      </div>
      <div class="tip" id="tip"></div>
    </div>
  </div>
</div>

  rhea:{name:'Rhea',race:'Caldari',iso:'Nitrogen Isotopes',isoId:17888,baseRange:5.0,baseFuel:3100},
  anshar:{name:'Anshar',race:'Gallente',iso:'Oxygen Isotopes',isoId:17887,baseRange:5.0,baseFuel:3100},
  nomad:{name:'Nomad',race:'Minmatar',iso:'Hydrogen Isotopes',isoId:17889,baseRange:5.0,baseFuel:3100},
};
const JOVE_REGIONS=new Set(['A821-A','J7HZ-F','UUA-F4','PR-01','J7HZ-F']);

// ---- data prep ----
const SYS=UNIVERSE.sys; // [name,id,sec,regionIdx,px2d,py2d,nx,ny,nz]
const REGIONS=UNIVERSE.regions;
const SC=UNIVERSE.scale;
const N=SYS.length;
const byId={}; const nameLower=[];
const PX=new Float32Array(N),PY=new Float32Array(N);          // official 2D map layout
const MX=new Float64Array(N),MY=new Float64Array(N),MZ=new Float64Array(N); // real metres (exact)
for(let i=0;i<N;i++){ const s=SYS[i]; byId[s[1]]=i; nameLower[i]=s[0].toLowerCase();
  PX[i]=s[4]; PY[i]=s[5];
  MX[i]=s[6]*SC.rX+SC.minX; MY[i]=s[7]*SC.rY+SC.minY; MZ[i]=s[8]*SC.rZ+SC.minZ; }
let calibrated=true; // distances come from static SDE coordinates — always available
function roundSec(s){ if(s>0&&s<0.05) return 0.1; return Math.round(s*10)/10; }
function secClass(s){ const r=roundSec(s); return r>=0.5?'hi':r>=0.1?'lo':'null'; }
function secColor(s){ const c=secClass(s); return c==='hi'?'#8cc86a':c==='lo'?'#d8a24a':'#d66a5a'; }
function regionOf(i){ return REGIONS[SYS[i][3]]; }
function jumpable(i){ const c=secClass(SYS[i][2]); const rg=regionOf(i); return (c==='lo'||c==='null') && rg!=='Pochven' && !JOVE_REGIONS.has(rg); }

// ---- state ----
let ship='anshar', JDC=5, JFC=5, JF=5, fatRed=true;
let waypoints=[]; // system indices
let killmap={}; // id -> {s,p,n}
let showGates=true, showHeat=false;
let maxKill=1;
let reachable=null; // indices within one jump of the last waypoint
let tipSysId=null;  // system whose pinned tooltip is open (for zKill auto-refresh)

// ---- ship/skill UI ----

shipsEl.innerHTML=Object.entries(SHIPS).map(([k,v])=>`<div class="ship${k===ship?' on':''}" data-s="${k}"><div class="nm">${v.name}</div><div class="iso">${v.iso.replace(' Isotopes','')} · ${v.race}</div></div>`).join('');
shipsEl.querySelectorAll('.ship').forEach(el=>el.onclick=()=>{ ship=el.dataset.s; shipsEl.querySelectorAll('.ship').forEach(x=>x.classList.toggle('on',x===el)); renderRoute(); draw(); });
function fillSel(id,min,max,val){ const s=document.getElementById(id); s.innerHTML=''; for(let i=min;i<=max;i++){const o=document.createElement('option');o.value=i;o.textContent=(id==='skJDC'||id==='skJFC'||id==='skJF')?roman(i):i;if(i===val)o.selected=true;s.appendChild(o);} }
function roman(n){return ['0','I','II','III','IV','V'][n]||n;}

document.getElementById('skJDC').onchange=e=>{JDC=+e.target.value;renderRoute();draw();};

// ---- formulas ----
function maxRange(){ return SHIPS[ship].baseRange*(1+0.2*JDC); }
function fuelPerLy(){ return SHIPS[ship].baseFuel*(1-0.1*JFC)*(1-0.1*JF); }
function lyBetween(i,j){ const dx=MX[i]-MX[j],dy=MY[i]-MY[j],dz=MZ[i]-MZ[j]; return Math.sqrt(dx*dx+dy*dy+dz*dz)/MPLY; }
function fmt(n){ return (n==null||isNaN(n))?'—':Math.round(n).toLocaleString(); }
function fmt1(n){ return (n==null||isNaN(n))?'—':(Math.round(n*10)/10).toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:1}); }
function mins(m){ if(m==null) return '—'; if(m<60) return Math.floor(m)+'m'; const h=Math.floor(m/60),mm=Math.floor(m%60); return h+'h '+mm+'m'; }

// ---- ESI calibration: reconstruct metres from normalised coords via linear regression ----
function calibrate(){ setCal('ok','distances · static SDE'); renderRoute(); draw(); }
function setCal(s,t){ document.getElementById('calDot').className='dot '+s; document.getElementById('calTxt').textContent=t; }

async function loadKills(){
  setKill('busy','loading kills…');
  try{
    const r=await fetch(esiUrl('/universe/system_kills/')); if(!r.ok) throw new Error();
    const d=await r.json(); killmap={}; maxKill=1;
    d.forEach(k=>{ const v={s:k.ship_kills||0,p:k.pod_kills||0,n:k.npc_kills||0}; killmap[k.system_id]=v; const pvp=v.s+v.p; if(pvp>maxKill) maxKill=pvp; });
    setKill('ok','kills · last hour');
  }catch(e){ setKill('err','kill feed offline'); }
  draw();
}
function setKill(s,t){ document.getElementById('killDot').className='dot '+s; document.getElementById('killTxt').textContent=t; }
function killHeat(id){ const k=killmap[id]; if(!k) return 0; return (k.s+k.p)/maxKill; }

// ---- ESI auth (PKCE, optional — public layers work without it) ----
const AUTH_KEY='eve_jfp_token';
const APP_CONFIG={ clientId:'6edf01f1ac0748c7852ce537058ad4ff', redirectUri:'https://novadragon22.github.io/Jump-Planner/' };
const SSO_AUTH='https://login.eveonline.com/v2/oauth/authorize/', SSO_TOKEN='https://login.eveonline.com/v2/oauth/token';
const SCOPES=['publicData','esi-location.read_location.v1'];
let session=null, pilotSys=null;
function redirectUri(){ return APP_CONFIG.redirectUri; }
function authHeaders(){ return session&&session.access?{Authorization:'Bearer '+session.access}:{}; }
function b64url(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
async function sha256(s){return await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));}
function randStr(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return b64url(a.buffer);}
function jwtPayload(t){return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}
function lget(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
function lset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ldel(k){try{localStorage.removeItem(k);}catch(e){}}
async function startAuth(){
  const verifier=randStr(48),challenge=b64url(await sha256(verifier)),state=randStr(12);
  lset('eve_jfp_pkce',{verifier,state});
  const u=new URL(SSO_AUTH);
  u.searchParams.set('response_type','code');u.searchParams.set('redirect_uri',APP_CONFIG.redirectUri);u.searchParams.set('client_id',APP_CONFIG.clientId);
  u.searchParams.set('scope',SCOPES.join(' '));u.searchParams.set('code_challenge',challenge);u.searchParams.set('code_challenge_method','S256');u.searchParams.set('state',state);
  location.assign(u.toString());
}
function openLogin(){ startAuth(); }
window.openLogin=openLogin;
async function resumeAuth(){
  const p=new URLSearchParams(location.search), code=p.get('code'), state=p.get('state'); if(!code)return;
  history.replaceState({},'',location.pathname);
  const pk=lget('eve_jfp_pkce'); if(!pk||state!==pk.state)return;
  try{ const body=new URLSearchParams({grant_type:'authorization_code',code,client_id:APP_CONFIG.clientId,code_verifier:pk.verifier,redirect_uri:APP_CONFIG.redirectUri});
    const r=await fetch(SSO_TOKEN,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body}); if(!r.ok)throw new Error();
    const tok=await r.json(); const pl=jwtPayload(tok.access_token);
    session={access:tok.access_token,refresh:tok.refresh_token,expires:Date.now()+(tok.expires_in||1200)*1000,charId:(pl.sub||'').split(':').pop(),charName:pl.name,clientId:APP_CONFIG.clientId};
    lset(AUTH_KEY,session); ldel('eve_jfp_pkce');
  }catch(e){}
}
async function refreshAuth(){ if(!session||!session.refresh)return null;
  try{ const body=new URLSearchParams({grant_type:'refresh_token',refresh_token:session.refresh,client_id:APP_CONFIG.clientId});
    const r=await fetch(SSO_TOKEN,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body}); if(!r.ok)throw new Error();
    const tok=await r.json(); session={...session,access:tok.access_token,refresh:tok.refresh_token||session.refresh,expires:Date.now()+(tok.expires_in||1200)*1000}; lset(AUTH_KEY,session); return session;
  }catch(e){return null;} }
async function ensureToken(){ if(!session)return null; if(session.expires>Date.now()+60000)return session; return await refreshAuth(); }
function logout(){ session=null; ldel(AUTH_KEY); pilotSys=null; renderAuth(); draw(); }
window.logout=logout;
function renderAuth(){ const a=document.getElementById('authArea');
  if(session) a.innerHTML=`<span class="pilot-chip"><img src="https://images.evetech.net/characters/${session.charId}/portrait?size=32" onerror="this.style.display='none'"><span class="pn">${session.charName||'pilot'}</span><span class="px" title="Sign out" onclick="logout()">✕</span></span>`;
  else a.innerHTML=`<button class="auth-btn" onclick="openLogin()">Sign in with EVE</button>`;
}
async function loadPilot(){ const t=await ensureToken(); if(!t)return;
  try{ const r=await fetch(esiUrl('/characters/'+t.charId+'/location/'),{headers:authHeaders()}); if(!r.ok)return; const d=await r.json(); pilotSys=byId[d.solar_system_id]!=null?byId[d.solar_system_id]:null; draw(); }catch(e){} }

// ---- sovereignty (public ESI) ----
let sovById={}, sovNames={}, showSov=true, sovLoaded=false; const allianceHue={};
function hue(id){ if(allianceHue[id]!=null)return allianceHue[id]; let h=0; const s=''+id; for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))%360; allianceHue[id]=h; return h; }
async function loadSov(){ if(sovLoaded)return; sovLoaded=true;
  try{ const r=await fetch(esiUrl('/sovereignty/map/'),{headers:authHeaders()}); if(!r.ok)throw new Error(); const d=await r.json();
    const ids=new Set(); d.forEach(s=>{ if(s.alliance_id||s.faction_id||s.corporation_id){ sovById[s.system_id]={a:s.alliance_id,f:s.faction_id,c:s.corporation_id}; if(s.alliance_id)ids.add(s.alliance_id); } });

    for(let i=0;i<list.length;i+=1000){ const chunk=list.slice(i,i+1000);

  }catch(e){ sovLoaded=false; }

}

  500007:['Ammatar Mandate','#b8862f'], 500008:['Khanid Kingdom','#4f8a6a'], 500009:['The Syndicate','#c87a3a'],
  500010:['Guristas Pirates','#c2b53e'], 500011:['Angel Cartel','#9a78c0'], 500012:['Blood Raider Covenant','#9a2424'],
  500013:['The InterBus','#8a98a4'], 500014:['ORE','#d08a3a'], 500015:['Thukker Tribe','#c0683a'],
  500016:['Servant Sisters of EVE','#8fb8b0'], 500017:['Society of Conscious Thought','#8fa0b0'],

function factionColor(f){ return FACTIONS[f]?FACTIONS[f][1]:'rgba(150,150,160,0.6)'; }
function factionName(f){ return FACTIONS[f]?FACTIONS[f][0]:(f?'Faction '+f:null); }
function sovColor(idx){ const id=SYS[idx][1], s=sovById[id];
  if(s&&s.a) return `hsl(${hue(s.a)},55%,56%)`;        // player alliance sovereignty
  const f=SYS[idx][9]; if(f) return factionColor(f);    // NPC faction (empire / pirate / Triglavian)

let staCache={}, showSta=false;
async function loadStations(idx){ const id=SYS[idx][1]; if(staCache[id]!=null)return staCache[id];
  staCache[id]={count:-1,names:[]}; // pending
  try{ const r=await fetch(esiUrl('/universe/systems/'+id+'/'),{headers:authHeaders()}); if(!r.ok)throw new Error(); const d=await r.json();
    const sids=d.stations||[]; const names=[];
    for(const sid of sids.slice(0,10)){ try{ const sr=await fetch(esiUrl('/universe/stations/'+sid+'/'),{headers:authHeaders()}); if(sr.ok)names.push((await sr.json()).name); }catch(e){} }
    staCache[id]={count:sids.length,names}; draw(); return staCache[id];
  }catch(e){ staCache[id]={count:0,names:[]}; return staCache[id]; }
}

// ---- search dropdown ----
const search=document.getElementById('search'), drop=document.getElementById('drop');
let dropHi=-1, dropItems=[];
search.addEventListener('input',()=>{ const q=search.value.trim().toLowerCase(); if(!q){drop.classList.remove('on');return;}
  const res=[]; for(let i=0;i<N && res.length<40;i++){ if(nameLower[i].startsWith(q)) res.push(i); }
  if(res.length<40){ for(let i=0;i<N && res.length<40;i++){ if(!nameLower[i].startsWith(q)&&nameLower[i].includes(q)) res.push(i); } }
  dropItems=res; dropHi=-1;
  drop.innerHTML=res.map((i,n)=>`<div class="opt" data-i="${i}"><span>${SYS[i][0]} <span class="ss" style="color:${secColor(SYS[i][2])}">${roundSec(SYS[i][2]).toFixed(1)}</span></span><span class="rg">${regionOf(i)}</span></div>`).join('')||'<div class="opt">no match</div>';
  drop.classList.add('on');
  drop.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{ if(o.dataset.i) addWp(+o.dataset.i); });
});
search.addEventListener('keydown',e=>{ if(!drop.classList.contains('on'))return;
  if(e.key==='ArrowDown'){dropHi=Math.min(dropItems.length-1,dropHi+1);hiDrop();e.preventDefault();}
  else if(e.key==='ArrowUp'){dropHi=Math.max(0,dropHi-1);hiDrop();e.preventDefault();}
  else if(e.key==='Enter'){ if(dropHi>=0&&dropItems[dropHi]!=null) addWp(dropItems[dropHi]); else if(dropItems[0]!=null) addWp(dropItems[0]); }
  else if(e.key==='Escape'){drop.classList.remove('on');} });
function hiDrop(){ drop.querySelectorAll('.opt').forEach((o,n)=>o.classList.toggle('hi',n===dropHi)); }
document.addEventListener('click',e=>{ if(!e.target.closest('.srch')) drop.classList.remove('on'); });

function addWp(i){ waypoints.push(i); search.value=''; drop.classList.remove('on'); if(showSta)loadStations(i); renderWps(); renderRoute(); draw(); }
function removeWp(n){ waypoints.splice(n,1); renderWps(); renderRoute(); draw(); }
window.removeWp=removeWp;

function renderWps(){
  const el=document.getElementById('wps');
  if(!waypoints.length){ el.innerHTML='<div class="wp-empty">No waypoints. Search a system, or click one on the map.<br>First waypoint is your origin (any sec); the rest must be low/null-sec.</div>'; return; }
  el.innerHTML=waypoints.map((i,n)=>{ const hs=n>0&&secClass(SYS[i][2])==='hi';
    return `<div class="wp${hs?' hs':''}"><span class="ord">${n===0?'◎':n}</span><span class="nm">${SYS[i][0]} <span style="color:${secColor(SYS[i][2])}">${roundSec(SYS[i][2]).toFixed(1)}</span><div class="rg">${regionOf(i)}</div></span><span class="x" onclick="removeWp(${n})">✕</span></div>`; }).join('');
}

// ---- route computation ----
function renderRoute(){
  // reachable systems from the last waypoint (exact ly), for the map highlight
  reachable=null;
  if(waypoints.length){ const o=waypoints[waypoints.length-1], mr=maxRange(); const out=[];
    for(let i=0;i<N;i++){ if(i===o)continue; if(!jumpable(i))continue; if(lyBetween(o,i)<=mr) out.push(i); }
    reachable=out;
  }
  const legsEl=document.getElementById('legs'), totEl=document.getElementById('tot');
  if(waypoints.length<2){ legsEl.innerHTML=''; totEl.innerHTML=''; renderNote(); return; }
  const fpl=fuelPerLy(), mr=maxRange(), iso=SHIPS[ship].iso, mod=fatRed?0.1:1.0;
  let totFuel=0, totLy=0, fatigue=0, totTime=0, anyBad=false; let rows='';
  for(let n=1;n<waypoints.length;n++){
    const a=waypoints[n-1], b=waypoints[n];
    const ly=lyBetween(a,b);
    const dest=SYS[b], destHi=secClass(dest[2])==='hi';
    const destBlocked=!jumpable(b);
    const over= ly!=null && ly>mr+1e-9;
    let warn='';
    if(destHi) warn='Cannot jump into high-sec — light a cyno in low/null.';
    else if(destBlocked) warn='Destination cannot be jumped to (Pochven/Jove).';
    else if(over) warn='Out of jump range ('+fmt1(ly)+' > '+fmt1(mr)+' ly).';
    const bad=destHi||destBlocked||over||ly==null&&false;
    if(bad) anyBad=true;
    let fuel=null,cd=null;
    if(ly!=null){ totLy+=ly; fuel=Math.ceil(ly*fpl); if(!destHi&&!destBlocked&&!over) totFuel+=fuel;
      cd=Math.max(1+ly, fatigue/10);
      const newFat=Math.min(7200, Math.max(fatigue,10)*(1+ly*mod));
      fatigue=Math.max(0,newFat-cd); totTime+=cd;
    }
    rows+=`<div class="leg ${bad?'bad':'ok'}">
      <div class="leg-top"><span>${SYS[a][0]} → ${SYS[b][0]}</span><span class="ly${over?' over':''}">${ly==null?'—':fmt1(ly)+' ly'}</span></div>
      <div class="leg-meta"><span class="fuel">${fuel==null?'—':fmt(fuel)+' '+iso.replace(' Isotopes','')}</span><span>cooldown ${mins(cd)} · fatigue ${mins(fatigue)}</span></div>
      ${warn?`<div class="warn">⚠ ${warn}</div>`:''}</div>`;
  }
  legsEl.innerHTML=rows;
  totEl.innerHTML=`
    <div class="tile"><div class="l">Total fuel</div><div class="v">${calibrated?fmt(totFuel):'—'}</div><div class="sub">${SHIPS[ship].iso}</div></div>
    <div class="tile"><div class="l">Total distance</div><div class="v cy">${calibrated?fmt1(totLy)+' ly':'—'}</div><div class="sub">${waypoints.length-1} jump${waypoints.length-1!==1?'s':''}</div></div>
    <div class="tile"><div class="l">Min route time</div><div class="v cy">${calibrated?mins(totTime):'—'}</div><div class="sub">cooldowns, jump-on-cd</div></div>
    <div class="tile"><div class="l">Fuel / ly · range</div><div class="v">${fmt(fpl)}</div><div class="sub">max ${fmt1(mr)} ly @ JDC ${roman(JDC)}</div></div>`;
  renderNote(anyBad);
}
function renderNote(anyBad){
  const el=document.getElementById('note');
  let s=`Distances are exact, computed from the EVE SDE 3D coordinates; fuel = ⌈ly × ${fmt(fuelPerLy())}⌉ per jump (base 3,100 × JFC × JF skill). The map uses CCP's official 2D layout and real stargate links. Jump range, fuel and fatigue follow current EVE formulas; fatigue/cooldown assume you jump the moment cooldown clears.`;
  if(anyBad) s+=` <span class="hl">One or more legs are invalid (range/high-sec).</span>`;
  el.innerHTML=s;
}

// ================= MAP =================
const cv=document.getElementById('map'), ctx=cv.getContext('2d');
const tip=document.getElementById('tip');
let view={x:500,y:500,zoom:0.6}; let DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){ const r=cv.getBoundingClientRect(); cv.width=r.width*DPR; cv.height=r.height*DPR; draw(); }
window.addEventListener('resize',resize);
function W(){return cv.width;} function H(){return cv.height;}
function wx(i){return PX[i]*1000;} function wy(i){return PY[i]*1000;}
function sx(worldx){return (worldx-view.x)*view.zoom+W()/2;}
function sy(worldy){return (worldy-view.y)*view.zoom+H()/2;}
function dataBounds(){ let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9; for(let i=0;i<N;i++){ const X=wx(i),Y=wy(i); if(X<x0)x0=X;if(X>x1)x1=X;if(Y<y0)y0=Y;if(Y>y1)y1=Y; } return [x0,x1,y0,y1]; }
function fit(){ const [x0,x1,y0,y1]=dataBounds(); const m=24*DPR; view.x=(x0+x1)/2; view.y=(y0+y1)/2;
  view.zoom=Math.min((W()-2*m)/((x1-x0)||1),(H()-2*m)/((y1-y0)||1)); draw(); }

function draw(){
  if(!ctx) return; const w=W(),h=H();
  ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle='#02040a'; ctx.fillRect(0,0,w,h);
  // gate links
  if(showGates){
    ctx.lineWidth=Math.max(0.6,0.7*DPR); ctx.strokeStyle='rgba(255,255,255,1)'; ctx.beginPath();
    for(const j of UNIVERSE.jumps){ const a=j[0],b=j[1]; ctx.moveTo(sx(wx(a)),sy(wy(a))); ctx.lineTo(sx(wx(b)),sy(wy(b))); }
    ctx.stroke();
  }
  // systems
  const r=Math.max(1.1, view.zoom*1.7)*DPR*0.8, sq=r*2;
  for(let i=0;i<N;i++){
    const px=sx(wx(i)),py=sy(wy(i)); if(px<-20||px>w+20||py<-20||py>h+20) continue;
    let col;
    if(showHeat){ const hh=killHeat(SYS[i][1]); if(hh<=0) col='rgba(70,90,105,0.5)'; else { const t=Math.min(1,0.25+hh*1.3); col=`rgba(${Math.round(150+105*t)},${Math.round(120-60*t)},${Math.round(90-50*t)},${0.55+0.45*t})`; } }
    else if(showSov){ col=sovColor(i); }
    else col=secColor(SYS[i][2]);
    ctx.fillStyle=col; ctx.fillRect(px-r,py-r,sq,sq);
  }
  // sovereignty icons (alliance logos) — only when sov layer on and zoomed in enough to read them
  if(showSov && view.zoom>=2.2){
    const s=Math.min(22, Math.max(13, view.zoom*5))*DPR;
    for(let i=0;i<N;i++){ const sv=sovById[SYS[i][1]]; if(!sv||!sv.a) continue;
      const px=sx(wx(i)),py=sy(wy(i)); if(px<-s||px>w+s||py<-s||py>h+s) continue;
      const img=allianceIcon(sv.a);
      if(img){ ctx.drawImage(img,px-s/2,py-s/2,s,s); }
      else { ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.beginPath(); ctx.arc(px,py,s/2,0,7); ctx.fill();
             ctx.fillStyle=sovColor(i); ctx.beginPath(); ctx.arc(px,py,s*0.3,0,7); ctx.fill(); }
    }
  }
  // route arcs + range ring
  if(waypoints.length){
    // highlight systems reachable in one jump from the last waypoint (exact ly from SDE metres)
    if(reachable && reachable.length){
      ctx.strokeStyle='rgba(122,184,200,0.7)'; ctx.lineWidth=1.3*DPR;
      for(const i of reachable){ const X=sx(wx(i)),Y=sy(wy(i)); if(X<-10||X>w+10||Y<-10||Y>h+10)continue;
        ctx.beginPath(); ctx.arc(X,Y,Math.max(3,view.zoom*2.4)*DPR,0,7); ctx.stroke(); }
    }
    ctx.lineWidth=1.6*DPR; ctx.strokeStyle='rgba(201,168,104,0.85)';
    ctx.beginPath();
    for(let n=0;n<waypoints.length;n++){ const i=waypoints[n]; const X=sx(wx(i)),Y=sy(wy(i)); if(n===0)ctx.moveTo(X,Y);else ctx.lineTo(X,Y); }
    ctx.stroke();
    // waypoint markers
    for(let n=0;n<waypoints.length;n++){ const i=waypoints[n]; const X=sx(wx(i)),Y=sy(wy(i));
      ctx.fillStyle=n===0?'#e8d296':'#c9a868'; ctx.beginPath(); ctx.arc(X,Y,5*DPR,0,7); ctx.fill();
      ctx.strokeStyle='#030507'; ctx.lineWidth=1.5*DPR; ctx.stroke();
      ctx.fillStyle='#e8d296'; ctx.font=`${11*DPR}px IBM Plex Mono`; ctx.textBaseline='middle';
      ctx.fillText(SYS[i][0], X+8*DPR, Y);
    }
  }
  // NPC station markers (cached, on-demand) — hollow gold squares
  if(showSta){ ctx.strokeStyle='rgba(201,168,104,0.9)'; ctx.lineWidth=1.4*DPR;
    for(const sid in staCache){ const c=staCache[sid]; if(!c||c.count<=0)continue; const i=byId[sid]; if(i==null)continue;
      const X=sx(wx(i)),Y=sy(wy(i)); const s=4.5*DPR; ctx.strokeRect(X-s,Y-s,2*s,2*s); }
  }
  // pilot marker
  if(pilotSys!=null){ const X=sx(wx(pilotSys)),Y=sy(wy(pilotSys));
    ctx.strokeStyle='#a0d0e0'; ctx.lineWidth=2*DPR; ctx.beginPath(); ctx.arc(X,Y,8*DPR,0,7); ctx.stroke();
    ctx.fillStyle='#a0d0e0'; ctx.font=`${10*DPR}px IBM Plex Mono`; ctx.textBaseline='middle'; ctx.fillText('you', X+11*DPR, Y);
  }
  // system names — hidden until zoomed in enough to be legible (zoom-in raised 50%)
  if(view.zoom>=5.1){
    ctx.fillStyle='rgba(180,196,208,0.78)'; ctx.font=`${9.5*DPR}px IBM Plex Mono`; ctx.textBaseline='middle';
    const off=(showSov&&view.zoom>=2.2)?Math.min(22,Math.max(13,view.zoom*5))*DPR*0.6:6*DPR;
    for(let i=0;i<N;i++){ if(SYS[i][1]>=31000000)continue; const px=sx(wx(i)),py=sy(wy(i)); if(px<0||px>w||py<0||py>h)continue;
      ctx.fillText(SYS[i][0], px+off, py); }
  }
}

// interaction
let dragging=false,last=null,moved=0,pinned=false;
cv.addEventListener('mousedown',e=>{dragging=true;moved=0;last=[e.clientX,e.clientY];cv.classList.add('drag');});
window.addEventListener('mouseup',()=>{dragging=false;cv.classList.remove('drag');});
window.addEventListener('mousemove',e=>{
  if(dragging){ const dx=e.clientX-last[0],dy=e.clientY-last[1]; moved+=Math.abs(dx)+Math.abs(dy); last=[e.clientX,e.clientY];
    view.x-=dx*DPR/view.zoom; view.y-=dy*DPR/view.zoom; draw(); if(moved>4){pinned=false;tip.classList.remove('on');} return; }
  hover(e);
});
cv.addEventListener('mouseleave',()=>{ if(!pinned) tip.classList.remove('on'); });
cv.addEventListener('wheel',e=>{ e.preventDefault(); const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*DPR,my=(e.clientY-r.top)*DPR;
  const wbx=(mx-W()/2)/view.zoom+view.x, wby=(my-H()/2)/view.zoom+view.y;
  const f=e.deltaY<0?1.18:1/1.18; view.zoom=Math.max(0.1,Math.min(120,view.zoom*f));
  view.x=wbx-(mx-W()/2)/view.zoom; view.y=wby-(my-H()/2)/view.zoom; draw();
},{passive:false});
function nearest(e){ const r=cv.getBoundingClientRect(); const mx=(e.clientX-r.left)*DPR,my=(e.clientY-r.top)*DPR;
  let best=-1,bd=14*DPR*14*DPR; for(let i=0;i<N;i++){ const px=sx(wx(i)),py=sy(wy(i)); const d=(px-mx)*(px-mx)+(py-my)*(py-my); if(d<bd){bd=d;best=i;} } return best; }
function hover(e){ if(pinned)return; const i=nearest(e); if(i<0){tip.classList.remove('on');return;} showTip(i,e.clientX,e.clientY); }
cv.addEventListener('click',e=>{ if(moved>4)return; const i=nearest(e);
  if(i>=0){ pinned=true; showTip(i,e.clientX,e.clientY,true); }
  else { pinned=false; tipSysId=null; tip.classList.remove('on'); } });
window.hideTip=()=>{ pinned=false; tipSysId=null; tip.classList.remove('on'); };

function showTip(i,cx,cy,pin){
  const s=SYS[i], id=s[1], k=killmap[id]||{s:0,p:0,n:0};
  const r=cv.getBoundingClientRect();
  const holder=sovHolder(i);
  if(pin) tipSysId=id;
  tip.innerHTML=`<div class="nm">${s[0]} <span style="color:${secColor(s[2])}">${roundSec(s[2]).toFixed(1)}</span>${pin?'<span class="tipx" onclick="hideTip()">✕</span>':''}</div>
    <div class="rg">${regionOf(i)} · ${secClass(s[2])==='hi'?'High-sec':secClass(s[2])==='lo'?'Low-sec':'Null-sec'}${jumpable(i)?'':' · no-jump'}</div>
    ${holder?`<div class="kv"><span>Sovereignty</span><b>${holder}</b></div>`:''}
    <div class="kv"><span>Ship kills (1h)</span><b>${k.s}</b></div>
    <div class="kv"><span>Pod kills (1h)</span><b>${k.p}</b></div>
    <div class="kv"><span>NPC kills (1h)</span><b>${k.n}</b></div>
    <div class="kv" id="staLine"><span>NPC stations</span><b>${staCache[id]&&staCache[id].count>=0?staCache[id].count:'…'}</b></div>
    <div class="zk" id="zk">zKillboard: loading…</div>
    <div class="act"><button onclick="addWp(${i})">+ Waypoint</button><a href="https://zkillboard.com/system/${id}/" target="_blank" rel="noopener">zKillboard ↗</a><a href="https://evemaps.dotlan.net/system/${s[0].replace(/ /g,'_')}" target="_blank" rel="noopener">Dotlan ↗</a></div>`;
  tip.classList.toggle('pinned',!!pin);
  const ZF=(r.width/cv.offsetWidth)||1; // CSS UI-zoom factor (getBoundingClientRect is post-zoom, offsetWidth pre-zoom)
  const lw=r.width/ZF, lh=r.height/ZF;
  let x=(cx-r.left)/ZF+14, y=(cy-r.top)/ZF+14; if(x>lw-250)x=lw-260; if(y>lh-200)y=lh-210;
  tip.style.left=x+'px'; tip.style.top=y+'px'; tip.classList.add('on');
  if(pin){ loadZk(id); loadStations(i).then(c=>{ const el=document.getElementById('staLine'); if(el&&c) el.innerHTML=`<span>NPC stations</span><b>${c.count}</b>`; }); }
}
async function loadZk(id){
  const el=document.getElementById('zk'); if(!el)return;
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  try{ const r=await fetch('https://zkillboard.com/api/kills/systemID/'+id+'/',{headers:{'Accept':'application/json'}});
    if(!r.ok) throw new Error(); const d=await r.json();
    if(document.getElementById('zk')) document.getElementById('zk').textContent='zKillboard: '+(Array.isArray(d)?d.length:0)+' recent kills · '+t;
  }catch(e){ if(document.getElementById('zk')) document.getElementById('zk').innerHTML='zKillboard API blocked by browser (CORS) — use the link below. <span style="color:var(--muted2)">'+t+'</span>'; }
}

// map buttons
document.getElementById('zin').onclick=()=>{view.zoom=Math.min(120,view.zoom*1.3);draw();};
document.getElementById('zout').onclick=()=>{view.zoom=Math.max(0.1,view.zoom/1.3);draw();};
document.getElementById('zfit').onclick=fit;
document.getElementById('zgate').onclick=e=>{showGates=!showGates;e.target.classList.toggle('on',showGates);draw();};
document.getElementById('zheat').onclick=e=>{showHeat=!showHeat;if(showHeat)showSov=false;document.getElementById('zsov').classList.remove('on');e.target.classList.toggle('on',showHeat);draw();};
document.getElementById('zsov').onclick=e=>{showSov=!showSov;if(showSov){showHeat=false;document.getElementById('zheat').classList.remove('on');loadSov();}e.target.classList.toggle('on',showSov);draw();};
document.getElementById('zsta').onclick=e=>{showSta=!showSta;e.target.classList.toggle('on',showSta);if(showSta)waypoints.forEach(i=>loadStations(i));draw();};
document.getElementById('zpilot').onclick=()=>{ if(!session){openLogin();return;} if(pilotSys==null){loadPilot();return;} view.x=wx(pilotSys);view.y=wy(pilotSys);view.zoom=Math.max(view.zoom,3);draw(); };

// init
session=lget(AUTH_KEY)||null;
renderWps(); renderRoute(); resize(); fit();
document.getElementById('calPill').style.cursor='default';
document.getElementById('zgate').classList.add('on');   // gate links on by default
document.getElementById('zsov').classList.add('on');    // sovereignty on by default
(async function(){ await resumeAuth(); session=session||lget(AUTH_KEY); renderAuth();
  calibrate(); loadKills(); loadSov(); if(session) loadPilot(); })();
setInterval(loadKills, 5*60000);
setInterval(()=>{ if(pinned && tipSysId!=null) loadZk(tipSysId); }, 6000); // zKillboard auto-refresh
</script>
</body>
